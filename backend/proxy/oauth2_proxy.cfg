# LifeOS Zero-Trust Identity Proxy Configuration

## Routing
http_address = "0.0.0.0:4180"
upstreams = [
    "http://lifeos-proxy:80/"
]

## Identity Provider
provider = "google"
authenticated_emails_file = "/etc/oauth2-proxy/emails.txt"

## Security: AES-256-GCM Stateless Cookies
cookie_secure = true
cookie_httponly = true
cookie_name = "_lifeos_session"
cookie_expire = "168h"
cookie_samesite = "lax"

## Upstream Header Hardening 
# Drops any spoofed X-Forwarded-User / X-Forwarded-Email from WAN before passing to application
pass_user_headers = true
set_xauthrequest = true
pass_basic_auth = false
skip_auth_preflight = false

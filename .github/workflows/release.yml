name: Release LifeOS Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'

      - name: Scaffold & Patch Android Project
        working-directory: ./client
        run: |
          # Backup our custom AndroidManifest before flutter create overwrites it
          cp android/app/src/main/AndroidManifest.xml /tmp/LifeOSManifest.xml
          flutter create --project-name lifeos_client --org com.lifeos.app --platforms=android,windows .
          flutter pub add desktop_multi_window:^0.2.0 drift
          # Restore our manifest that declares LifeOSWidgetProvider
          cp /tmp/LifeOSManifest.xml android/app/src/main/AndroidManifest.xml
          # Strip local JVM paths so Gradle uses setup-java path on the runner
          sed -i '/org.gradle.java/d' android/gradle.properties

      - name: Install Dependencies
        working-directory: ./client
        run: flutter pub get

      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-release-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'

      - name: Scaffold Missing Project Files
        working-directory: ./client
        run: |
          flutter create --project-name lifeos_client --org com.lifeos.app --platforms=android,windows .
          flutter pub add desktop_multi_window:^0.2.0 drift

      - name: Install Dependencies
        working-directory: ./client
        run: flutter pub get

      - name: Build Windows
        working-directory: ./client
        run: flutter build windows --release

      - name: Zip Windows Build
        run: Compress-Archive -Path client\build\windows\x64\runner\Release\* -DestinationPath lifeos-windows-release.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lifeos-windows-zip
          path: lifeos-windows-release.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download APK Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: app-release-apk
          path: release-artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: lifeos-windows-zip
          path: release-artifacts

      - name: Generate Release Body
        run: |
          BUILD_NUM=$(jq '.build_number' .agent/version.json)
          cat <<EOF > release_notes.md
          ## Release Build #$BUILD_NUM — v1.1.0

          ### Highlights
          - **Spatial Engine Performance Optimization**: Resolved aggressive module culling by enforcing `clipBehavior: Clip.none` on the primary translation Stack. Bypassed the 60FPS widget rebuild loop during pan gestures by wrapping all spatial matrix modules in `RepaintBoundary` nodes, converting pan gestures to `ValueNotifier<Offset>`, and executing `Transform.translate` within a `ValueListenableBuilder`. This ensures near-zero CPU/GPU overhead during cross-matrix navigation.
          - **Ultra-Fast App Startup**: Pre-warmed preferences and async startup sequences (Preferences, session restoration, database init, registry mounting) resolved instantly in under **60 milliseconds** (instant startup).
          - **Simplified Double-Tap Gesture Engine**: Simplified double-tap functionality to toggle spatial navigation gestures seamlessly across all screens, eliminating hit-test culling collisions.
          - **OTA Update Alignment**: Configured the client `UpdateManager` OTA path to map directly to the Go daemon's `/api/update/download` endpoint, enabling clean local/Tailscale network updates.
          - **Direct USB Deployment**: Deployed and launched the compiled release binary directly onto the USB-connected Android test device.
          - **Windows Build Warnings**: Silenced MSVC experimental coroutine warnings for clean compiler diagnostics.
          EOF

      - name: Publish Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          body_path: release_notes.md
          files: |
            release-artifacts/app-release.apk
            release-artifacts/lifeos-windows-release.zip

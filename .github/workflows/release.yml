name: Release LifeOS Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'

      - name: Scaffold & Patch Android Project
        working-directory: ./client
        run: |
          # Backup our custom AndroidManifest before flutter create overwrites it
          cp android/app/src/main/AndroidManifest.xml /tmp/LifeOSManifest.xml
          flutter create --project-name lifeos_client --org com.lifeos.app --platforms=android,windows .
          flutter pub add desktop_multi_window:^0.2.0 drift
          # Restore our manifest that declares LifeOSWidgetProvider
          cp /tmp/LifeOSManifest.xml android/app/src/main/AndroidManifest.xml
          # Strip local JVM paths so Gradle uses setup-java path on the runner
          sed -i '/org.gradle.java/d' android/gradle.properties

      - name: Install Dependencies
        working-directory: ./client
        run: flutter pub get

      - name: Build APK
        working-directory: ./client
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-release-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'

      - name: Scaffold Missing Project Files
        working-directory: ./client
        run: |
          flutter create --project-name lifeos_client --org com.lifeos.app --platforms=android,windows .
          flutter pub add desktop_multi_window:^0.2.0 drift

      - name: Install Dependencies
        working-directory: ./client
        run: flutter pub get

      - name: Build Windows
        working-directory: ./client
        run: flutter build windows --release

      - name: Zip Windows Build
        run: Compress-Archive -Path client\build\windows\x64\runner\Release\* -DestinationPath lifeos-windows-release.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lifeos-windows-zip
          path: lifeos-windows-release.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download APK Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: app-release-apk
          path: release-artifacts

      - name: Download Windows Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: lifeos-windows-zip
          path: release-artifacts

      - name: Generate Release Body
        run: |
          BUILD_NUM=$(jq '.build_number' .agent/version.json)
          cat <<EOF > release_notes.md
          ## Release Build #$BUILD_NUM — v1.0.2

          ### Highlights
          - **Full Authentication System**: Server-side user registration and login with bcrypt hashing, JWT-style token validation, and persistent client sessions.
          - **Maps & Live Tracking Suite**: Real-time GPS tracking with OpenStreetMap integration, WebSocket live-feed, geofence zone drawing, navigation overlay, and location automation triggers.
          - **Point Star System Overhaul**: Redesigned dashboard with progress bars, star level indicators, and a full voucher redemption shop with categorized rewards and animations.
          - **Android Launcher Mode**: Stock-Android home screen experience with app drawer, wallpaper, dock bar, and point-gated app access control.
          - **Remote System Management API**: Server endpoints for reboot, shutdown, service control, log streaming, and health diagnostics.

          ### New Features
          - Auth service with login screen, token persistence, and server URL configuration.
          - Location tracker plugin with battery-optimized background GPS collection.
          - Maps dashboard: header bar, OSM map widget, live feed preview, report banner, geofence drawer, and navigation overlay.
          - Admin console and user profile widgets in Preferences.
          - Backend: user management, location WebSocket, geofence engine, automation triggers, and full system router (status/reboot/shutdown/services/logs).

          ### Bug Fixes & Improvements
          - Removed 129 lines of obsolete spatial engine code (spatial_grid_layer, spatial_hud, spatial_layout_utils).
          - Simplified configurator widget by stripping 80+ lines of dead code.
          - Fixed import paths in desktop_widget_manager and diagnostics_controller.
          - Enhanced lock screen overlay with PIN entry, biometric fallback, and animated transitions.
          - Expanded notifications feed display logic.
          - Added location history and geofences tables to local Drift database.

          ### Infrastructure
          - Bumped client version to 1.0.2+2.
          - Added geolocator, flutter_map, and web_socket_channel dependencies.
          - Updated AndroidManifest with fine/coarse/background location permissions.
          - Updated .gitignore for compiled Linux binaries, Tailscale state, and editor configs.
          - Extensive documentation updates across 30+ vault files.

          ### How It Was Built
          - **Android App**: Compiled targeting android-arm64 architecture.
          - **Windows App**: Compiled native runner on Windows instance, packaged as ZIP archive.
          EOF

      - name: Publish Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          body_path: release_notes.md
          files: |
            release-artifacts/app-release.apk
            release-artifacts/lifeos-windows-release.zip

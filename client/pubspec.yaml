name: lifeos_client
description: A new Flutter project.
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  window_manager: ^0.3.8
  desktop_multi_window: ^0.2.0
  drift: any
  web_socket_channel: ^3.0.3
  path_provider: ^2.1.5
  http: ^1.2.0
  url_launcher: ^6.3.2
  installed_apps: ^2.1.1
  geolocator: ^14.0.3
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_displaymode: ^0.7.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.4
  permission_handler: ^11.3.1
  nsd: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  drift_dev: any
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logo.png"
  linux:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
